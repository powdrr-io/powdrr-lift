    rationale: Satisfy the platform compatibility requirement.
  - id: skill-package-contains-powdrr-lift-cli
    source: skill-package
    target: powdrr-lift-cli
    relationship: contains
    description: The distributable package includes the CLI surface.
    rationale: Ship the install-and-validate entry point together with the skills.
  - id: skill-package-contains-powdrr-lift-mcp
    source: skill-package
    target: powdrr-lift-mcp
    relationship: contains
    description: The distributable package includes the MCP surface.
    rationale: Ship the agent-native entry point together with the skills.
  - id: homebrew-installs-skill-package
    source: homebrew
    target: skill-package
    relationship: installs
    description: Homebrew provides the single-command macOS install path for the packaged skill suite.
    rationale: Satisfy the macOS installation example.
  - id: cli-delegates-core
    source: powdrr-lift-cli
    target: skill-core-module
    relationship: delegates_to
    description: The CLI defers rendering and validation to shared core logic.
    rationale: Keep CLI behavior aligned with the service surface.
  - id: mcp-delegates-core
    source: powdrr-lift-mcp
    target: skill-core-module
    relationship: delegates_to
    description: The MCP surface defers rendering and validation to shared core logic.
    rationale: Keep MCP behavior aligned with the CLI surface.
  - id: cli-mcp-mirror
    source: powdrr-lift-cli
    target: powdrr-lift-mcp
    relationship: mirrors
    description: The CLI and MCP expose the same render and validate capabilities.
    rationale: Preserve CLI and MCP parity.
  - id: core-renders-template
    source: skill-core-module
    target: skill-template-file
    relationship: renders
    description: The core module renders canonical skill templates and spec documents.
    rationale: Keep authored content and generated artifacts separate.
  - id: core-validates-metadata
    source: skill-core-module
    target: skill-metadata-file
    relationship: validates
    description: The core module validates the agent metadata that accompanies each skill.
    rationale: Prevent broken agent wrappers from shipping.
  - id: core-generates-package
    source: skill-core-module
    target: skill-package
    relationship: generates
    description: The core module materializes installable skill packages from the canonical sources.
    rationale: Preserve the single-source-of-truth authoring model.
invariants:
  - id: canonical-skill-source-invariant
    description: The skill-package must be generated from the canonical template and metadata files rather than hand-edited as distributed content.
    rationale: Keep the authored source of truth separate from generated artifacts.
    related:
      entities:
        - skill-core-module
        - skill-template-file
        - skill-metadata-file
        - skill-package
      entity_relationships:
        - core-renders-template
        - core-validates-metadata
        - core-generates-package
  - id: cli-mcp-parity-invariant
    description: The CLI and MCP surfaces must expose the same generation and validation behavior.
    rationale: Make the repo usable from both shell-first and agent-native workflows.
    related:
      entities:
        - powdrr-lift-cli
        - powdrr-lift-mcp
        - skill-core-module
      entity_relationships:
        - cli-delegates-core
        - mcp-delegates-core
        - cli-mcp-mirror
  - id: cross-platform-install-invariant
    description: The packaged skills must install on macOS, Windows, and Linux, with a single-command Homebrew path on macOS.
    rationale: Satisfy the installation and portability requirements.
    related:
      entities:
        - skill-package
        - homebrew
        - macos
        - windows
        - linux
        - powdrr-lift-cli
      entity_relationships:
        - skill-package-supports-macos
        - skill-package-supports-windows
        - skill-package-supports-linux
        - skill-package-contains-powdrr-lift-cli
        - skill-package-contains-powdrr-lift-mcp
        - homebrew-installs-skill-package
guidance:
  - id: generate-from-canonical-source
    description: Author the skills once in the template and metadata files, then render the installable package from the shared core module.
    rationale: Avoid per-agent hand editing and keep the package reproducible.
    related:
      entities:
        - skill-template-file
        - skill-metadata-file
        - skill-core-module
        - skill-package
      entity_relationships:
        - core-renders-template
        - core-validates-metadata
        - core-generates-package
  - id: validate-before-distribution
    description: Run the CLI or MCP validation path before publishing or installing updated skills.
    rationale: Catch template, metadata, and packaging regressions before they reach users.
    related:
      entities:
        - powdrr-lift-cli
        - powdrr-lift-mcp
        - skill-core-module
      entity_relationships:
        - cli-delegates-core
        - mcp-delegates-core
  - id: keep-agent-surfaces-thin
    description: Keep the agent-specific metadata declarative so Claude Code, Codex, Aider, Cursor, Antigravity, and OpenCode all consume the same packaged skill content.
    rationale: Make the distributed skill set broad without duplicating behavior per agent.
    related:
      entities:
        - skill-metadata-file
        - skill-package
        - claude-code
        - codex
        - aider
        - cursor
        - antigravity
        - opencode
      entity_relationships:
        - skill-package-targets-claude-code
        - skill-package-targets-codex
        - skill-package-targets-aider
        - skill-package-targets-cursor
        - skill-package-targets-antigravity
        - skill-package-targets-opencode
