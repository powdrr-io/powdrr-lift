    rationale: Keep the packaged skill set complete.
  - id: skill-package-contains-prepare-pr-changelog
    source: skill-package
    target: prepare-pr-changelog
    relationship: contains
    description: The distributable package includes the prepare-pr-changelog skill.
    rationale: Keep the packaged skill set complete.
  - id: skill-package-contains-review-pr-changelog
    source: skill-package
    target: review-pr-changelog
    relationship: contains
    description: The distributable package includes the review-pr-changelog skill.
    rationale: Keep the packaged skill set complete.
  - id: skill-package-contains-specify-architecture
    source: skill-package
    target: specify-architecture
    relationship: contains
    description: The distributable package includes the specify-architecture skill.
    rationale: Keep the packaged skill set complete.
  - id: skill-package-contains-specify-implementation
    source: skill-package
    target: specify-implementation
    relationship: contains
    description: The distributable package includes the specify-implementation skill.
    rationale: Keep the packaged skill set complete.
  - id: skill-package-contains-specify-prs
    source: skill-package
    target: specify-prs
    relationship: contains
    description: The distributable package includes the specify-prs skill.
    rationale: Keep the packaged skill set complete.
  - id: skill-package-contains-specify-system
    source: skill-package
    target: specify-system
    relationship: contains
    description: The distributable package includes the specify-system skill.
    rationale: Keep the packaged skill set complete.
  - id: skill-package-contains-synchronize-code-and-state
    source: skill-package
    target: synchronize-code-and-state
    relationship: contains
    description: The distributable package includes the synchronize-code-and-state skill.
    rationale: Keep the packaged skill set complete.
  - id: skill-package-targets-claude-code
    source: skill-package
    target: claude-code
    relationship: targets
    description: The packaged skills are installable in Claude Code.
    rationale: Satisfy the required agent compatibility surface.
  - id: skill-package-targets-codex
    source: skill-package
    target: codex
    relationship: targets
    description: The packaged skills are installable in Codex.
    rationale: Satisfy the required agent compatibility surface.
  - id: skill-package-targets-aider
    source: skill-package
    target: aider
    relationship: targets
    description: The packaged skills are installable in Aider.
    rationale: Satisfy the required agent compatibility surface.
  - id: skill-package-targets-cursor
    source: skill-package
    target: cursor
    relationship: targets
    description: The packaged skills are installable in Cursor.
    rationale: Satisfy the required agent compatibility surface.
  - id: skill-package-targets-antigravity
    source: skill-package
