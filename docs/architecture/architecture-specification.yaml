version: 1
id: "2026-05-22-skill-distribution-architecture"
title: "Skill distribution platform architecture"
entities:
  - id: bootstrap
    type: Skill
    summary: Analyze repo evidence and create validated PR changelogs.
    rationale: Bootstrap the changelog workflow that keeps repo changes traceable.
  - id: code-edit-context
    type: Skill
    summary: Report changelog-backed context for a file and line ranges.
    rationale: Support code review and edit-context workflows for agents.
  - id: prepare-pr-changelog
    type: Skill
    summary: Generate and validate PR changelog templates.
    rationale: Make PR preparation consistent across agent surfaces.
  - id: review-pr-changelog
    type: Skill
    summary: Review PR changelogs against the declared intent.
    rationale: Catch changelog regressions before publish time.
  - id: specify-architecture
    type: Skill
    summary: Define architecture specs from allowed entity types.
    rationale: Capture the system architecture in a validated repository format.
  - id: specify-implementation
    type: Skill
    summary: Define implementation specs from a chosen architecture id.
    rationale: Keep implementation details aligned with approved architecture.
  - id: specify-prs
    type: Skill
    summary: Define proposed PR specs from feature references and intent.
    rationale: Tie implementation work back to feature-level goals.
  - id: specify-system
    type: Skill
    summary: Define system specs for the installable skill platform.
    rationale: Preserve the product-level intent that the architecture serves.
  - id: synchronize-code-and-state
    type: Skill
    summary: Compare codebase state against the source tree and reconcile gaps.
    rationale: Keep the generated state view and the code in agreement.
  - id: powdrr-lift-cli
    type: CLI app
    summary: Cross-platform command line entry point for spec generation and validation.
    rationale: Provide one shell surface for authors and operators.
  - id: powdrr-lift-mcp
    type: Service
    summary: MCP surface that mirrors the CLI workflows for agents.
    rationale: Let agents use the same capabilities without shell mediation.
  - id: skill-core-module
    type: Module
    summary: Shared rendering and validation logic for skill artifacts and specs.
    rationale: Keep the CLI and MCP behaviorally aligned.
  - id: skill-template-file
    type: Template file
    summary: Canonical skill source template and generated specification documents.
    rationale: Author once and render many target surfaces.
  - id: skill-metadata-file
    type: Configuration file
    summary: Agent metadata that describes how a skill is surfaced in each agent.
    rationale: Keep per-agent wrappers thin and declarative.
  - id: skill-package
    type: Package
    summary: Installable bundle containing the skills and their metadata.
    rationale: Ship one artifact that can be installed into multiple agent ecosystems.
  - id: homebrew
    type: Package manager
    summary: macOS single-command install path for the CLI and package bundle.
    rationale: Satisfy the macOS brew-based install requirement.
  - id: claude-code
    type: Application
    summary: Supported agent application that consumes the packaged skills.
    rationale: One of the required target agents.
  - id: codex
    type: Application
    summary: Supported agent application that consumes the packaged skills.
    rationale: One of the required target agents.
  - id: aider
    type: Application
    summary: Supported agent application that consumes the packaged skills.
    rationale: One of the required target agents.
  - id: cursor
    type: Application
    summary: Supported agent application that consumes the packaged skills.
    rationale: One of the required target agents.
  - id: antigravity
    type: Application
    summary: Supported agent application that consumes the packaged skills.
    rationale: One of the required target agents.
  - id: opencode
    type: Application
    summary: Supported agent application that consumes the packaged skills.
    rationale: One of the required target agents.
  - id: macos
    type: Platform
    summary: Supported macOS installation platform.
    rationale: Required for the single-command Homebrew install path.
  - id: windows
    type: Platform
    summary: Supported Windows installation platform.
    rationale: Required for cross-platform CLI and MCP delivery.
  - id: linux
    type: Platform
    summary: Supported Linux installation platform.
    rationale: Required for cross-platform CLI and MCP delivery.
entity_relationships:
  - id: skill-package-contains-bootstrap
    source: skill-package
    target: bootstrap
    relationship: contains
    description: The distributable package includes the bootstrap skill.
    rationale: Keep the packaged skill set complete.
  - id: skill-package-contains-code-edit-context
    source: skill-package
