schema: https://powdrr.io/schemas/changelog-v1
version: 1
change_id: 13
title: Index entities and relationships
intent:
  problem: Changelog provenance tracked code spans but did not normalize entities
    or model relationships across the repository graph.
  goal: Normalize changelog entities into a repository-wide graph, persist that graph
    in the code index, and validate entity lifecycle and relationship references.
decisions:
- id: graph-model
  summary: Store changelog provenance as a normalized entity graph alongside line-level
    provenance.
entities:
- id: PublicAPI
  type: Package
  action: added
- id: ChangelogIndex
  type: Indexer
  action: added
- id: EntityGraph
  type: Graph
  action: added
- id: CodeIndexCache
  type: Storage
  action: added
- id: ChangelogParser
  type: Parser
  action: added
- id: ChangeLogTemplate
  type: Template
  action: added
- id: ChangeLogValidator
  type: Validator
  action: added
