version: 1
change_id: 14
title: Add entity context lookups
intent:
  problem: Agents could inspect file spans and provenance, but they could not ask
    for entity-specific references or relationship context directly.
  goal: Let agents look up entity references, entity relationships, and affected entities
    from code spans using the normalized changelog index.
decisions:
- id: entity-context-api
  summary: Add explicit entity reference and relationship lookup APIs on top of the
    normalized provenance index.
