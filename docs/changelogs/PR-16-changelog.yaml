schema: https://powdrr.io/schemas/changelog-v1
change_id: 16
title: Add entity decision lookup
intent:
  problem: The index could answer entity references and relationships, but there was
    no way to ask which PR decisions mention a given entity.
  goal: Expose a CLI/MCP lookup that returns the decisions from PRs mentioning an
    entity, while keeping the cached index self-contained with only the structured
    changelog data needed for lookup.
decisions:
- id: ARCH-ENTITY-002
  summary: Persist normalized changelog data in SQLite so indexed entity lookups
    retain the PR metadata they need.
- id: ARCH-ENTITY-003
  summary: Expose a dedicated entity decision lookup through the shared CLI, MCP,
    and public API surfaces.
