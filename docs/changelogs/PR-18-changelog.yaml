schema: https://powdrr.io/schemas/changelog-v1
change_id: 18
title: Add changelog validation example to review skill
intent:
  problem: The review skill description did not give agents a concrete example for
    how to invoke changelog validation.
  goal: Make the installable code review skill explicitly show how to run changelog
    validation, while keeping the rest of the review workflow unchanged.
decisions:
- id: SKILL-REVIEW-001
  summary: Keep the changelog review skill focused on changelog-aware code review,
    not a replacement for general review.
entities:
- id: ReviewSkill
  type: Skill
  action: added
- id: ChangelogValidation
  type: CLI
  action: added
- id: CodeReviewWorkflow
  type: Workflow
  action: added
changes:
- file: skills/review-pr-changelog/SKILL.md
  span:
    start_line: 3
    end_line: 3
  summary: Update the skill description to clarify its code-review role and add a
    validation example.
  affects:
  - ReviewSkill
  - CodeReviewWorkflow
  rationale: Give agents a concrete validation command while preserving normal code
    review behavior.
- file: skills/review-pr-changelog/SKILL.md
  span:
    start_line: 17
    end_line: 17
  summary: Add an example command for changelog validation.
  affects:
  - ReviewSkill
  - ChangelogValidation
  rationale: Show agents the exact CLI invocation for validating a PR changelog.
relationship_changes:
- action: update
  source: ReviewSkill
  target: ChangelogValidation
  relationship: references
  rationale: The skill now points agents at the validation command to run during
    review.
- action: update
  source: ReviewSkill
  target: CodeReviewWorkflow
  relationship: complements
  rationale: The skill is still an add-on to general code review, not a replacement.
