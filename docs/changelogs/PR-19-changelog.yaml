version: 2
change_id: 19
title: Add changelog version 2
intent:
  problem: The repository is being migrated from version 1 changelog documents to a version
    2 schema with nested files, entities, invariants, and guidance, while keeping version
    1 parsing and indexing support intact.
  goal: Introduce changelog version 2, update the parser, template, validation, and cache/index
    support, and keep the existing version 1 format readable.
decisions:
- id: ADR-001
  summary: Introduce version 2 of the changelog schema while preserving version 1 parsing
    and indexing support.
