schema: https://powdrr.io/schema/changelog-v2
change_id: 21
title: Add bootstrap changelog skill
intent:
  problem: The repository needs an installable skill that can guide an agent
    through repository analysis, taxonomy-based entity selection, changelog v2
    drafting, validation, and commit preparation.
  goal: Add a bootstrap skill under skills/bootstrap with matching UI metadata
    so other agents can install it and use it to draft validated changelog v2
    documents from source tree evidence.
