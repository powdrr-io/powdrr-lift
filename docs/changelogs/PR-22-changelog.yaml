version: 2
change_id: 22
title: Populate related sections in changelog templates
intent:
  problem: Generated changelog templates only prefilled part of the related context, and file entries were not round-tripping full related data through the code index.
  goal: Prefill related sections for generated changelog entries, persist file related data in the SQLite code index, and cover the behavior with regression tests.
