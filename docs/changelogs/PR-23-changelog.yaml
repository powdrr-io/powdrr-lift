title: Simplify file related metadata
intent:
  problem: The changelog template and validator still treated file-entry
    related metadata as optional scaffolding instead of a canonical place for
    file references.
  goal: Make file-entry related metadata explicit, reject empty related blocks,
    and keep the parser and tests aligned with the new shape.
