entities:
  - id: codebase-state
    type: Subcommand
    action: added
    related:
      files:
        - src/powdrr_lift/cli.py
        - src/powdrr_lift/core/codebase_state.py
        - src/powdrr_lift/core/__init__.py
        - src/powdrr_lift/__init__.py
  - id: get_codebase_state
    type: Request handler
    action: added
    related:
      files:
        - src/powdrr_lift/mcp_server.py
        - src/powdrr_lift/core/codebase_state.py
        - src/powdrr_lift/core/__init__.py
        - src/powdrr_lift/__init__.py
entity_relationships:
  - source: codebase-state
    target: get_codebase_state
    relationship: mirrors
    description: Both entry points materialize the same changelog-derived
      snapshot and return the same YAML structure.
    rationale: Keep the CLI and MCP surfaces aligned while sharing the core
      builder.
invariants:
  - id: index-only-source
    description: Build the snapshot from the changelog index and branch
      metadata rather than the live working tree.
    action: added
  - id: replay-order
    description: Replay changelog documents in order so deleted or removed
      items disappear from the current snapshot.
    action: added
  - id: default-output-path
    description: Write the snapshot to `.powdrr-lift/state/codebase-state.yaml`
      when no output path is supplied.
    action: added
guidance:
  - id: cli-generation
    description: Use `powdrr-lift codebase-state` to materialize the snapshot
      file after the changelog index is updated.
    action: added
  - id: mcp-access
    description: Use `get_codebase_state` when the snapshot is needed through
      the MCP interface.
    action: added
