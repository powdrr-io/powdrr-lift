version: 2
change_id: 24
title: Add codebase state endpoint
intent:
  problem: Agents needed a single changelog-derived snapshot of the current
    codebase state.
  goal: Add a CLI command and MCP tool that write a YAML snapshot containing
    the current entities, relationships, invariants, guidance, decisions, and
    intents from the changelog index.
decisions:
  - id: ARCH-001
    summary: Generate the codebase state solely from the changelog index and
      surface it through both CLI and MCP entry points.
files:
  - path: src/powdrr_lift/core/codebase_state.py
    type: added
    span:
      start_line: 1
      end_line: 490
    summary: Implement the changelog-indexed codebase state snapshot builder and
      YAML serializer.
    rationale: Provide the shared replay logic that materializes current
      entities, relationships, invariants, guidance, decisions, and intents
      from the changelog index.
  - path: src/powdrr_lift/cli.py
    type: modified
    span:
      start_line: 10
      end_line: 11
    summary: Import the codebase state helpers into the CLI.
    rationale: Reuse the shared snapshot builder and default output path helper
      from the core module.
