schema: https://powdrr.io/schema/changelog-v2
change_id: 25
title: Add synchronize-code-and-state skill
intent:
  problem: The repository needs an installable skill that can reconcile the
    generated codebase state with the source tree and changelog index after
    code or state drift.
  goal: Add a skill under skills/synchronize-code-and-state that tells an
    agent to generate the current codebase state, compare it to the source
    tree, resolve mismatches by changing code and/or the changelog while
    preserving intent, and validate the result before committing.
decisions:
  - id: skill-reconciliation-flow
    summary: Start by generating the codebase state snapshot, then let the
      agent decide whether code, the changelog, or both should move to restore
      agreement.
