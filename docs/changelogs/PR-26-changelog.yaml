entity_relationships:
- source: current-decisions
  target: get_current_decisions
  relationship: mirrors
  description: The CLI subcommand and MCP tool surface the same current-decision report.
  rationale: Keep the CLI and MCP surfaces aligned.
- source: invariants
  target: get_invariants
  relationship: mirrors
  description: The CLI subcommand and MCP tool surface the same invariant report.
  rationale: Keep the CLI and MCP surfaces aligned.
- source: branch_decision
  target: decision_status
  relationship: stores
  description: The SQLite branch_decision table stores whether each decision is current or
    superseded.
  rationale: Persist the current-state filter in the index.
- source: branch_decision
  target: replaces_decision_id
  relationship: stores
  description: The SQLite branch_decision table stores the decision id replaced by a superseding
    decision.
  rationale: Persist explicit supersession links in the index.
invariants:
- id: unique-changelog-ids
  description: Every decision, entity, relationship, invariant, and guidance id within a changelog
    file must be unique.
  action: added
- id: decision-status-tracking
  description: SQLite must track whether each indexed decision is current or superseded.
  action: added
- id: current-decisions-only
  description: The current-decisions report must exclude superseded decisions.
  action: added
- id: current-invariants-only
  description: The invariants report must include only the currently active invariants.
  action: added
- id: explicit-supersession
  description: A decision that supersedes an earlier decision must explicitly name the decision
    it replaces.
  action: added
guidance:
- id: review-branch-invariants
  description: Call `get_invariants` and assign one subagent per invariant to check whether
    the PR still satisfies it.
  action: added
- id: review-current-decisions
  description: Call `get_current_decisions` and assign one subagent per current decision to
    check whether the PR honors it.
  action: added
- id: review-superseding-decisions
  description: Fail the review if a superseding decision does not explicitly declare which
    previous decision it replaces.
  action: added
