schema: https://powdrr.io/schema/changelog-v2
version: 2
change_id: 26
title: Add changelog review endpoints
intent:
  problem: Changelog review needed direct access to the current invariants and current decisions,
    and the changelog index needed to distinguish current decisions from superseded ones.
  goal: Add validation, indexing, CLI, MCP, and review-skill support for globally unique changelog
    ids, current invariants, and current decisions.
decisions:
- id: ARCH-002
  summary: Track decision status in SQLite and expose current-decision and invariant reporting
    through CLI and MCP entry points.
- id: ARCH-003
  summary: Require globally unique changelog ids and explicit supersession references when
    a new decision replaces an older one.
files:
