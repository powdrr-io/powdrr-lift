  type: modified
  span:
    start_line: 24
    end_line: 30
  summary: Add review steps that fetch current invariants and current decisions before producing
    feedback.
  rationale: The review workflow needs direct access to the authoritative current invariants
    and decisions before it can judge the PR.
  related:
    files:
    - skills/review-pr-changelog/agents/openai.yaml
    - src/powdrr_lift/__init__.py
    - src/powdrr_lift/change_log_validation.py
