schema: https://powdrr.io/schema/changelog-v2
change_id: 27
title: Track coedited files in review context
intent:
  problem: The changelog review workflow could not reliably surface sibling code areas
    edited in the same changelog, and new templates still seeded related.files even
    though that information should come from the changelog index.
  goal: Derive coedited files from shared changelog file entries, surface them through
    edit-context, blame, and entity-reference lookups, and update the review skill
    and template accordingly.
decisions:
- id: coedited-files-from-changelog
  summary: Derive coedited files from sibling file entries in the same changelog document.
- id: review-context-surface
  summary: Surface coedited files in edit-context, blame, and entity-reference lookups
    so review workflows can inspect sibling code areas.
