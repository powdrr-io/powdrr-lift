entity_relationships:
  - source: specify-architecture
    target: architecture-specification
    relationship: guides
    description: The skill tells agents to use the template-generation CLI to
      create an architecture specification before filling it out.
    rationale: Keep the installable skill aligned with the new CLI workflow.
  - source: specify-architecture
    target: evaluate-architecture-specification
    relationship: guides
    description: The skill tells agents to validate and iterate on the
      architecture specification until it passes.
    rationale: Make validation part of the core skill workflow.
  - source: architecture-specification
    target: create_architecture_specification
    relationship: mirrors
    description: The CLI command and MCP tool generate the same starter
      architecture specification template.
    rationale: Keep the shell and MCP surfaces behaviorally equivalent.
  - source: evaluate-architecture-specification
    target: validate_architecture_specification
    relationship: mirrors
    description: The CLI command and MCP tool validate the same architecture
      specification rules.
    rationale: Keep the shell and MCP validation entry points aligned.
invariants:
  - id: allowed-entity-types-only
    description: Architecture specifications may only assign entity types from
      the entity type list supplied to the template generator or validator.
    rationale: Prevent specs from drifting outside the repository's approved
      taxonomy.
    action: added
  - id: referenced-entities-must-exist
    description: Any entity mentioned in an entity relationship, invariant, or
      guidance item must appear in the entities section.
    rationale: Keep relationships and prose grounded in entities that are
      actually present in the specification.
    action: added
  - id: shared-workflow-surface
    description: The CLI and MCP surfaces should expose the same template
      creation and validation behavior.
    rationale: Let the skill work the same way in both terminal and agent
      contexts.
    action: added
guidance:
  - id: generate-first
    description: Use the template-generation endpoint first, then populate the
      entities, entity relationships, invariants, and guidance sections.
    rationale: Start from the repository-approved scaffold instead of inventing
      a specification shape.
    action: added
  - id: validate-and-iterate
    description: Run the validation endpoint after filling the template and
      revise the specification until validation succeeds.
    rationale: Keep the architecture specification aligned with the enforced
      reference rules.
    action: added
  - id: preserve-intent
    description: When validation fails, adjust the specification to preserve
      the intended architecture rather than weakening the rules.
    rationale: Favor best judgment that keeps the spec, the code, and the
      repository's existing intent in agreement.
    action: added
