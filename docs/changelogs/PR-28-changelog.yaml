schema: https://powdrr.io/schema/changelog-v2
version: 2
change_id: 28
title: Add specify-architecture skill and endpoints
intent:
  problem: Agents need a reusable skill and matching CLI/MCP workflow for
    drafting architecture specifications from an allowed entity-type set and
    validating that the specification only references listed entities.
  goal: Add an installable specify-architecture skill plus CLI and MCP
    endpoints that can generate an architecture-specification template, guide
    the agent to fill it, validate the result, and iterate until the
    specification passes validation.
decisions:
  - id: arch-spec-surface
    summary: Expose the architecture-specification workflow through both CLI
      and MCP entry points so the same behavior is available to terminal and
      agent callers.
  - id: arch-spec-validation-rules
    summary: Treat the provided entity-type list as authoritative and require
      every relationship, invariant, and guidance reference to point at an
      entity listed in the specification.
