schema: https://powdrr.io/schema/changelog-v2
version: 2
change_id: 29
title: Add specify-implementation skill and endpoints
intent:
  problem: Agents need a reusable workflow for authoring implementation specs
    against a specific architecture version, including architecture ids,
    entity and relationship references, and globally unique feature and
    decision ids.
  goal: Add an installable specify-implementation skill plus CLI and MCP
    endpoints that can generate an implementation-specification template,
    validate implementation specs against an architecture specification, and
    iterate until validation passes.
decisions:
  - id: implementation-spec-flow
    summary: Make implementation specification creation and validation a
      first-class CLI and MCP workflow, parallel to architecture
      specification.
  - id: architecture-id-required
    summary: Require architecture specifications to carry an id and use that
      id as the version key for implementation specifications.
  - id: implementation-ids-unique
    summary: Require feature and decision ids to be globally unique within an
      implementation specification.
