entity_relationships:
  - source: specify-implementation
    target: specify-architecture
    relationship: depends_on
    description: The implementation skill expects the source architecture
      specification to exist and have an id before the template is generated.
    rationale: Keep implementation specs grounded in a concrete architecture
      version.
  - source: specify-implementation
    target: implementation-specification
    relationship: guides
    description: The skill tells agents to create and fill the implementation
      template before validating it.
    rationale: Keep the installable skill aligned with the new CLI workflow.
  - source: specify-implementation
    target: evaluate-implementation-specification
    relationship: guides
    description: The skill tells agents to validate and iterate on the
      implementation spec until it passes.
    rationale: Make validation part of the core skill workflow.
  - source: implementation-specification
    target: create_implementation_specification
    relationship: mirrors
    description: The CLI command and MCP tool generate the same starter
      implementation specification template.
    rationale: Keep the shell and MCP template surfaces behaviorally
      equivalent.
  - source: evaluate-implementation-specification
    target: validate_implementation_specification
    relationship: mirrors
    description: The CLI command and MCP tool validate the same implementation
      specification rules.
    rationale: Keep the shell and MCP validation entry points aligned.
  - source: implementation-specification
    target: architecture-specification
    relationship: depends_on
    description: Implementation specifications are generated and validated
      against a specific architecture version.
    rationale: Keep implementation specs constrained to the architecture they
      reference.
invariants:
  - id: architecture-id-must-exist
    description: An implementation specification must reference an architecture
      specification id that exists in the selected architecture specification.
    rationale: Ensure implementation specs are tied to a concrete architecture
      version.
    action: added
  - id: architecture-references-must-exist
    description: Any entity or relationship mentioned in an implementation
      spec must exist in the selected architecture specification.
    rationale: Keep implementation specs grounded in architecture data rather
      than invented references.
    action: added
  - id: implementation-ids-must-be-unique
    description: Feature ids and decision ids must be globally unique within an
      implementation specification.
    rationale: Prevent collisions across the feature and decision sections.
    action: added
guidance:
  - id: create-template-first
    description: Use the implementation-specification template generator first,
      then fill in the architecture id, entities, relationships, features, and
      decisions.
    rationale: Start from the repository-approved scaffold instead of inventing
      the implementation spec shape.
    action: added
  - id: validate-and-iterate
    description: Run the implementation-specification validator after filling
      the template and revise the spec until it succeeds.
    rationale: Keep the implementation spec aligned with the enforced
      architecture and uniqueness rules.
    action: added
  - id: preserve-architecture-intent
    description: When validation fails, prefer fixes that preserve the intended
      architecture and the implementation plan rather than weakening the rules.
    rationale: Favor best judgment that keeps the spec, the code, and the
      repository's intent in agreement.
    action: added
