schema: https://powdrr.io/schema/changelog-v2
version: 2
change_id: 30
title: Add specify-prs skill and PR specification endpoints
intent:
  problem: Agents need a reusable workflow for drafting proposed PR
    specifications that reference current feature ids, capture the PR goal
    and reasoning, and validate the proposed PR id and file references before
    proceeding.
  goal: Add an installable specify-prs skill plus CLI and MCP endpoints that
    can generate and validate PR specification templates.
decisions:
  - id: specify-prs-workflow
    summary: Make PR specification authoring and validation a first-class skill,
      CLI, and MCP workflow.
  - id: pr-specification-current-features
    summary: Source feature ids from the current codebase state when generating
      PR specification templates, with a fallback to implementation-spec
      files when the state snapshot is unavailable.
  - id: pr-specification-unique-ids
    summary: Require proposed PR ids to be globally unique within the repository.
