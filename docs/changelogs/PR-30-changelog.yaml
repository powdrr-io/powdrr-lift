  - source: specify-prs
    target: pr-specification
    relationship: guides
    description: The skill tells agents to generate a PR specification
      template before filling it in.
    rationale: Keep the installable skill aligned with the new CLI workflow.
  - source: specify-prs
    target: evaluate-pr-specification
    relationship: guides
    description: The skill tells agents to validate and iterate on the PR
      specification until it passes.
    rationale: Make validation part of the core skill workflow.
  - source: specify-prs
    target: create_pr_specification
    relationship: guides
    description: The skill tells agents to use the MCP template tool when
      working through the PR specification workflow.
    rationale: Keep the MCP path aligned with the CLI path.
  - source: specify-prs
    target: validate_pr_specification
    relationship: guides
    description: The skill tells agents to use the MCP validation tool when
      working through the PR specification workflow.
    rationale: Keep the MCP path aligned with the CLI path.
  - source: pr-specification-core
    target: pr-specification
    relationship: mirrors
    description: The CLI command and core module generate the same PR
      specification template.
    rationale: Keep the shell surface and core API behaviorally equivalent.
  - source: pr-specification-core
    target: evaluate-pr-specification
    relationship: mirrors
    description: The CLI command and core module validate the same PR
      specification rules.
    rationale: Keep the shell surface and core API aligned.
invariants:
  - id: unique-proposed-pr-ids
    action: added
    description: Proposed PR ids must not collide with existing PR
      specification files.
    rationale: Keep proposed PR specifications globally addressable.
    related:
      entities:
        - pr-specification-core
        - evaluate-pr-specification
      entity_relationships:
        - specify-prs -> evaluate-pr-specification
guidance:
  - id: one-template-per-pr
    action: added
    description: Generate one PR specification template per proposed PR.
    rationale: Keep each proposal isolated and easy to validate.
    related:
      entities:
        - specify-prs
        - pr-specification
      entity_relationships:
        - specify-prs -> pr-specification
  - id: validate-and-iterate
    action: added
    description: Fill the template, run validation, and fix any issues until
      it passes.
    rationale: Make validation the final gate before using the PR
      specification.
    related:
      entities:
        - evaluate-pr-specification
        - validate_pr_specification
      entity_relationships:
        - specify-prs -> evaluate-pr-specification
