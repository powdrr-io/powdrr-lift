schema: https://powdrr.io/schema/changelog-v2
version: 2
change_id: 31
title: Add feature and PR state sections to changelogs
intent:
  problem: Version 2 changelogs can describe files, entities, relationships,
    invariants, and guidance, but they cannot yet record the lifecycle state of
    a feature or proposed PR.
  goal: Extend the changelog format and validator so version 2 documents can
    track feature and proposed PR state updates using in_progress or completed
    states.
decisions:
  - id: changelog-state-sections
    summary: Add optional top-level features and prs sections to version 2
      changelogs.
  - id: changelog-state-validation
    summary: Validate feature ids against the current codebase state and
      proposed PR ids against existing changelog files, while constraining state
      values to in_progress or completed.
