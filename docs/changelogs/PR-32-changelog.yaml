version: 2
change_id: 32
title: Add specify-system skill and system specification endpoints
intent:
  problem: Agents need a reusable workflow for drafting system descriptions
    that separate requirements from approach, enforce same-section supersedence
    rules, and expose the workflow through both CLI and MCP.
  goal: Add an installable specify-system skill plus CLI and MCP endpoints
    that can generate and validate system specification templates.
decisions:
  - id: specify-system-workflow
    summary: Make system specification authoring and validation a first-class
      skill, CLI, and MCP workflow.
  - id: system-specification-state-rules
    summary: Validate requirement and approach entries with added, removed,
      and supercedes state rules, including same-section supersedence and
      unique ids.
  - id: system-specification-api-surface
    summary: Expose the new system specification helpers through the package
      root, core namespace, CLI, and MCP server.
