invariants:
  - id: system-specification-state-invariant
    action: added
    description: Requirement and approach items must use added, removed, or
      supercedes, with description and same-section supersedence rules enforced
      by the validator.
    rationale: Keep the system specification format internally consistent.
guidance:
  - id: create-template-first
    action: added
    description: Generate the system specification template first, then fill
      in the requirements and approach sections.
    rationale: Start from the repository-approved scaffold instead of
      inventing the system spec shape.
  - id: validate-and-iterate
    action: added
    description: Run the system specification validator after filling the
      template and revise the spec until it succeeds.
    rationale: Keep the system spec aligned with the enforced state and
      supersedence rules.
