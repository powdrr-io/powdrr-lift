schema: https://powdrr.io/schema/changelog-v2
change_id: 38
title: Expand changelog related references
intent:
  problem: Changelog related sections needed to support the expanded proposed-PR detail references
    and optional related ids.
  goal: Allow file entries to reference proposed-PR detail sections, validate empty related
    lists away, and accept quoted ids from the current graph.
decisions:
- id: changelog-related-references
  summary: Allow optional proposed-PR detail references and quoted rationale ids in changelog
    related sections.
