schema: https://powdrr.io/schema/changelog-v2
change_id: 40
title: Add implement-pr workflow and proposed PR search endpoints
intent:
  problem: The repository could not yet locate and inspect proposed PRs before implementing them,
    and the existing specify-prs guidance still described an older, files-based proposal flow.
  goal: Add an installable implement-pr skill plus fuzzy proposed-PR search and inspection
    endpoints, then align the existing proposal workflow instructions with the current proposed-PR
    format.
decisions:
  - id: implement-pr-workflow
    summary: Add a dedicated implement-pr skill that searches, validates, inspects, and then
      implements a proposed PR before changelog preparation.
  - id: proposed-pr-search-endpoints
    summary: Expose fuzzy proposed-PR search and direct inspection through the CLI and MCP
      surfaces.
structured_files:
  - docs/architecture/architecture-specification.yaml
  - docs/implementation/implementation-specification.yaml
