schema: https://powdrr.io/schema/changelog-v2
change_id: '42'
title: Add implement-pr workflow and spec migration
intent:
  problem: The repository needed a validated way to discover, inspect, and implement
    proposed PRs while keeping the specification format and changelog workflow aligned.
  goal: Add the implement-pr workflow, proposed PR discovery endpoints, and the specification
    migration needed to support the new installable skills.
decisions:
- id: unified-spec-layout
  summary: Store the core specifications under docs/specs/<work-item-name> using specification-v1.
- id: immutable-structured-files
  summary: Treat merged structured files as immutable and reject post-merge edits.
- id: implement-pr-workflow
  summary: Add implement-pr discovery, validation, and execution support across CLI
    and MCP.
structured_files:
- docs/specs/PR-40/proposed-pr-specification.yaml
- docs/specs/PR-41/proposed-pr-specification.yaml
- docs/specs/PR-42/proposed-pr-specification.yaml
- docs/specs/PR-43/proposed-pr-specification.yaml
- docs/specs/powdrr-lift/architecture-specification.yaml
- docs/specs/powdrr-lift/implementation-specification.yaml
- docs/specs/powdrr-lift/system-specification.yaml
