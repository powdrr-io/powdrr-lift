schema: https://powdrr.io/schema/changelog-v2
change_id: '43'
title: Add current state synthesis endpoint
intent:
  problem: The repository needed a way to synthesize a complete current-state specification
    from indexed structured specs and changelog-derived lifecycle data.
  goal: Add a CLI and MCP endpoint that derive a specification-v1 current-state report
    from the index, prune removed items, and omit completed proposed PRs.
decisions:
- id: current-state-synthesis
  summary: Capture the current-state synthesis workflow.
