schema: https://powdrr.io/schema/changelog-v2
version: 2
change_id: 47
title: Add required test case evidence to proposed PR changelogs
intent:
  problem: null
  goal: Strengthen proposed PRs and changelogs so each change includes explicit required
    test cases and validation proves the evidence points to real changed code.
decisions:
- id: decision-required-test-cases-are-plan-evidence
  summary: Treat required test cases as explicit proposed-PR evidence rather than
    as a free-form note in the changelog.
- id: decision-validation-is-fail-closed
  summary: Make changelog validation fail closed when a required test case reference
    is missing, stale, or disconnected from source.
- id: decision-preserve-workflow-order
  summary: Keep the plan, implementation, changelog, and diff workflow order intact
    and use the diff only to drive code changes.
structured_files:
- docs/specs/PR-47/proposed-pr-specification.yaml
- docs/specs/required-test-cases/feature-pr-specification.yaml
- docs/specs/required-test-cases/system-map-specification.yaml
