entities:
- id: proposed-pr-specification
  type: Template file
  action: added
  description: Proposed PR template that now includes required test cases as an evidence
    section.
  rationale: This is the source of truth for what evidence the changelog must cite.
- id: changelog-template
  type: Template file
  action: modified
  description: Generated changelog template with related sections for changed files.
  rationale: This template is where evidence links from changed hunks are recorded.
- id: changelog-validator
  type: Module
  action: added
  description: Validation engine for changelog YAML.
  rationale: It must enforce the new required test case linkage rules.
- id: changelog-parser
  type: Module
  action: added
  description: Parser that loads changelog YAML into typed structures.
  rationale: It must preserve required test case ids so validation and indexing can
    use them.
- id: changelog-code-index
  type: Module
  action: added
  description: Code index and round-trip helper for changelog metadata.
  rationale: It must not drop required test case ids when it rewrites related sections.
- id: pr-specification-validator
  type: Module
  action: added
  description: Validator for proposed PR templates.
  rationale: It must accept and validate the new required_test_cases section.
entity_relationships:
- id: pr-specification-feeds-changelog-evidence
  source: proposed-pr-specification
  target: changelog-template
  relationship: feeds
  description: The proposed PR document tells the changelog generator which required
    tests should exist.
  rationale: Evidence links in the changelog must trace back to the planned test cases.
  action: added
- id: changelog-parser-feeds-validator
  source: changelog-parser
  target: changelog-validator
  relationship: feeds
  description: Parsed required test case ids are handed to validation.
  rationale: Validation cannot check references if the parser drops them.
  action: added
- id: changelog-code-index-preserves-related-evidence
  source: changelog-code-index
  target: changelog-template
  relationship: supports
  description: The code index carries required test case evidence through regeneration.
  rationale: Regeneration should keep the evidence links already discovered in the
    branch.
  action: added
- id: pr-validator-exposes-required-test-cases
  source: pr-specification-validator
  target: proposed-pr-specification
  relationship: validates
  description: The PR validator must require and validate required_test_cases entries.
  rationale: The planned evidence should be checked before implementation starts.
  action: added
- id: changelog-validator-checks-source-locations
  source: changelog-validator
  target: changelog-template
  relationship: validates
  description: The changelog validator must verify that required test case references
    map to real changed source locations.
  rationale: A required test case reference without a real source span is not usable
    evidence.
  action: added
invariants:
- id: inv-required-test-cases-exist-in-pr-spec
  description: Every required_test_cases entry in a proposed PR specification must
    have both an id and a description.
  action: added
  related:
    entities:
    - proposed-pr-specification
    - pr-specification-validator
  rationale: The changelog can only cite evidence that is explicitly described in
    the plan.
- id: inv-changelog-required-test-case-reference-valid
  description: Every changelog related.required_test_cases entry must resolve to a
    required_test_cases id in the current proposed PR specifications.
  action: added
  related:
    entities:
    - changelog-validator
    - proposed-pr-specification
  rationale: The validator should reject stale or invented evidence references.
- id: inv-evidence-matches-changed-source
  description: Every required test case reference in a changelog must be tied to a
    changed source file span that exists in the branch diff.
  action: added
  related:
    entities:
    - changelog-template
    - changelog-validator
  rationale: Evidence needs to point at the actual code that changed.
- id: inv-roundtrip-preserves-required-test-cases
  description: Required test case ids must survive parser, template, and index round-trips
    unchanged.
  action: added
  related:
    entities:
    - changelog-parser
    - changelog-code-index
  rationale: Dropping evidence references would make regenerated changelogs incomplete.
guidance:
- id: guide-use-new-section-first
  description: Add the required_test_cases section to the proposed PR spec before
    wiring changelog validation against it.
  action: added
  related:
    entities:
    - proposed-pr-specification
    - changelog-validator
  rationale: The validator needs a source of truth before the changelog can cite it.
- id: guide-only-code-fixes
  description: If the plan diff shows a mismatch, change the implementation code instead
    of rewriting the plan or changelog to make the mismatch disappear.
  action: added
  related:
    entities:
    - changelog-validator
    - changelog-code-index
  rationale: The workflow should close real gaps, not hide them.
- id: guide-test-the-evidence-path
  description: Add tests that fail when required test case ids are missing, malformed,
    or disconnected from changed source hunks.
  action: added
  related:
    entities:
    - pr-specification-validator
    - changelog-parser
  rationale: The new evidence path is only trustworthy if validation covers the failure
    modes.
features:
- id: feature-required-test-cases
  state: completed
- id: feature-required-test-case-validation
  state: completed
- id: feature-roundtrip-evidence-preservation
  state: completed
proposed_prs: []
