schema: https://powdrr.io/schema/changelog-v2
change_id: '47'
title: Add required test case evidence
intent:
  problem: Proposed PRs did not have a dedicated way to declare required test cases,
    and changelog evidence could not explicitly point back to those cases.
  goal: Add required test case evidence to proposed PR specs and enforce that changelog
    related sections can cite those test cases from real changed source hunks.
decisions:
- id: required-test-case-evidence
  summary: Treat required test cases as first-class proposed-PR evidence.
