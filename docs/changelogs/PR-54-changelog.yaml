      start_line: 1
      end_line: 422
    summary: Add the reverse proxy implementation, exchange recording, and streaming relay logic.
    rationale: The new command needs a local proxy layer that forwards requests to OpenAI and persists each exchange without changing the client workflow.
    related:
      entities:
        - openai-proxy-service
        - openai-exchange-record
        - proxy-log-directory
        - openai-proxy-cli
      invariants:
        - inv-forward-verbatim
        - inv-record-every-exchange
        - inv-preserve-streaming
      guidance:
        - guide-recording-format
      non_goals:
        - ng-auth-management
        - ng-prompt-rewriting
        - ng-multi-provider-routing
      risks:
        - risk-secret-spillage
        - risk-streaming-complexity
        - risk-api-drift
  - path: src/powdrr_lift/cli.py
    type: modified
    span:
      start_line: 59
      end_line: 65
    summary: Import the OpenAI proxy server helpers into the CLI.
    rationale: The CLI needs to expose the new proxy command and its configuration helpers.
    related:
      entities:
        - openai-proxy-cli
      acceptance_criteria:
        - ac-proxy-starts
      expected_tests:
        - test-proxy-cli
      expected_outcomes:
        - outcome-transparent-setup
  - path: src/powdrr_lift/cli.py
    type: modified
    span:
      start_line: 801
      end_line: 843
    summary: Add the openai-proxy command and its setup flags.
    rationale: The operator needs a one-time setup command for binding the proxy and choosing where exchange records are stored.
    related:
      entities:
        - openai-proxy-cli
        - proxy-log-directory
        - openai-proxy-service
      guidance:
        - guide-setup-env
      acceptance_criteria:
        - ac-proxy-starts
      expected_tests:
        - test-proxy-cli
      expected_outcomes:
        - outcome-transparent-setup
  - path: src/powdrr_lift/cli.py
    type: modified
    span:
      start_line: 1345
      end_line: 1364
    summary: Add the CLI runner that builds and serves the OpenAI proxy.
    rationale: The command needs an execution path that resolves the log directory and starts the proxy server.
    related:
      entities:
        - openai-proxy-cli
        - openai-proxy-service
      expected_outcomes:
        - outcome-transparent-setup
  - path: tests/test_openai_proxy.py
    type: added
    span:
      start_line: 1
      end_line: 244
    summary: Add end-to-end coverage for forwarding, recording, streaming, and CLI wiring.
    rationale: The new proxy command needs regression tests that prove it behaves transparently against a fake upstream API.
    related:
      entities:
        - openai-proxy-service
        - openai-exchange-record
      invariants:
