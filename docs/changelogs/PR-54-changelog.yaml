schema: https://powdrr.io/schema/changelog-v2
change_id: 54
title: Add transparent OpenAI proxy recorder
intent:
  problem: null
  goal: Add a transparent proxy that sits between Codex and the OpenAI API and records all LLM input and output.
human-decisions:
  - id: openai-proxy-reverse-layer
    action: added
    summary: Implement the feature as a local reverse proxy in front of the OpenAI API instead of modifying Codex or the OpenAI client.
  - id: openai-proxy-record-raw-exchanges
    action: added
    summary: Record the raw request and response bodies so the full model input and output can be inspected later.
  - id: openai-proxy-stream-while-recording
    action: added
    summary: Preserve streamed responses to the client while buffering the response for on-disk exchange recording.
  - id: relax-spec-v1-validation
    action: added
    summary: Relax the spec-v1 validators so sparse system, architecture, implementation, and PR specifications can validate when their present sections remain coherent.
  - id: validate-structured-files-in-changelogs
    action: added
    summary: Validate every spec-v1 structured file listed in a PR changelog by running the corresponding spec validator for each listed file.
features:
  - id: feature-openai-proxy-recording
    state: completed
    description: Transparent local OpenAI proxy that records all request and response payloads.
entities:
  - id: openai-proxy-service
    type: Service
    action: added
  - id: openai-upstream-api
    type: Service
    action: added
  - id: openai-exchange-record
    type: Audit log
    action: added
  - id: proxy-log-directory
    type: File storage service
    action: added
  - id: openai-proxy-cli
    type: Command
    action: added
entity_relationships:
  - id: rel-cli-starts-proxy
    source: openai-proxy-cli
    target: openai-proxy-service
    relationship: starts
    description: The CLI command launches the local proxy server.
    rationale: The operator needs a simple setup path to start recording traffic.
  - id: rel-proxy-forwards-upstream
    source: openai-proxy-service
    target: openai-upstream-api
    relationship: forwards_to
    description: The proxy forwards every OpenAI request to the configured upstream service.
    rationale: Preserve the normal OpenAI API workflow while inserting the recording layer.
  - id: rel-proxy-writes-records
    source: openai-proxy-service
    target: openai-exchange-record
    relationship: writes
    description: The proxy writes one exchange record for every request and response it handles.
    rationale: Keep the complete input/output history on disk.
  - id: rel-records-live-in-logdir
    source: openai-proxy-service
    target: proxy-log-directory
    relationship: writes_to
    description: The proxy stores its exchange records in the configured log directory.
    rationale: Make the recording location configurable and durable.
invariants:
  - id: inv-forward-verbatim
    action: added
    description: The proxy must forward the OpenAI request path, method, and body without altering the payload semantics.
    rationale: Any request mutation would break transparency and undermine the recorded trace.
  - id: inv-record-every-exchange
    action: added
    description: Every successful or failed proxied exchange must be recorded exactly once.
    rationale: The proxy exists to preserve the full conversation history.
  - id: inv-preserve-streaming
    action: added
    description: Streamed upstream responses must remain streamed to the client.
    rationale: The proxy must not change the user-visible behavior after setup.
guidance:
  - id: guide-setup-env
    action: added
    description: Configure the client to point at the proxy base URL once, then keep using the normal OpenAI or Codex workflow.
    rationale: The proxy should be invisible after initial setup.
  - id: guide-recording-format
    action: added
    description: Store each exchange as a structured record with the request and response bodies available for later inspection.
    rationale: The logs should be usable for auditing, debugging, and replay.
acceptance_criteria:
  - id: ac-proxy-starts
    description: The CLI can start the proxy with an upstream OpenAI base URL, a bind host and port, and a writable log directory.
  - id: ac-request-forwarding
    description: A request sent to the proxy reaches a fake upstream OpenAI server with the same method, path, headers needed for the API call, and body content.
  - id: ac-response-forwarding
    description: The proxy returns the upstream response status and body unchanged to the client.
  - id: ac-exchange-recording
    description: Each proxied exchange writes a structured record to disk that contains the request body and the response body.
  - id: ac-streaming
    description: Streamed upstream responses are relayed to the client without waiting for the full response to finish first.
expected_tests:
  - id: test-proxy-cli
    description: Verify the CLI parser and runner expose the new proxy command and its setup flags.
  - id: test-proxy-forwarding
    description: Exercise the proxy against a fake upstream server and assert the request and response bodies are preserved.
  - id: test-proxy-recording
    description: Assert that the proxy writes a structured exchange record for each request.
  - id: test-proxy-streaming
    description: Verify that streamed responses are relayed to the client while still being captured for logging.
expected_outcomes:
  - id: outcome-transparent-setup
    description: After the one-time proxy setup, the user can keep using Codex with the proxy base URL without any additional workflow changes.
  - id: outcome-auditable-traffic
    description: The operator can inspect the recorded exchange history on disk to see exactly what was sent to and received from the LLM.
non_goals:
  - id: ng-auth-management
    description: The proxy does not manage OpenAI API keys beyond forwarding the client-supplied authorization header to the upstream service.
  - id: ng-prompt-rewriting
    description: The proxy does not alter prompts, completions, or tool call payloads.
  - id: ng-multi-provider-routing
    description: The proxy does not route traffic across multiple model providers or vendor endpoints.
risks:
  - id: risk-secret-spillage
    description: Recorded request bodies may contain sensitive content, so the log directory must be treated as sensitive data.
  - id: risk-streaming-complexity
    description: Streaming proxying is more complex than buffering a single JSON response and could regress if chunk handling is wrong.
  - id: risk-api-drift
    description: The OpenAI API surface may evolve, so the proxy should avoid hard-coding assumptions that are easy to break.
structured_files:
  - docs/specs/openai-proxy-recording/system-map-specification.yaml
  - docs/specs/openai-proxy-recording/feature-pr-specification.yaml
