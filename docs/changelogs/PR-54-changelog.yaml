      acceptance_criteria:
        - ac-proxy-starts
        - ac-request-forwarding
        - ac-response-forwarding
        - ac-exchange-recording
        - ac-streaming
      expected_tests:
        - test-proxy-cli
        - test-proxy-forwarding
        - test-proxy-recording
        - test-proxy-streaming
      expected_outcomes:
