version: 1
change_id: 7
title: Add changelog provenance index
intent:
  problem: There was no persistent private store for replaying changelog documents into a line-level provenance index across branch refreshes.
  goal: Build a smart SQLite-backed provenance index in `.powdrr-lift/state/code_index.db` that maps current source lines back to the changelog change that introduced them and refreshes when the branch or parent branch changes.
decisions:
  - id: INDEX-001
    summary: Replay merged PR changelog docs in mainline order and transform line provenance through later diffs.
  - id: INDEX-002
    summary: Persist branch snapshots in SQLite keyed by branch and parent branch heads for fast file/span lookup and refresh checks.
entities: []
changes:
  - file: src/powdrr_lift/__init__.py
    span:
      start_line: 1
      end_line: 114
    summary: Export the branch snapshot and SQLite lookup APIs from the top-level package.
    affects: []
    rationale: Make the private code index store and its refresh/lookup helpers available to library callers without reaching into internal modules.
  - file: src/powdrr_lift/core/__init__.py
    span:
      start_line: 1
      end_line: 71
    summary: Re-export the SQLite-backed code index API through the core package.
    affects: []
    rationale: Keep the core package aligned with the rest of the thin-wrapper module layout and surface the new index and lookup functions consistently.
  - file: src/powdrr_lift/core/code_index.py
    span:
      start_line: 1
      end_line: 834
    summary: Implement the SQLite-backed branch snapshot store and file/span lookup path.
    affects: []
    rationale: Persist branch state in `.powdrr-lift/state/code_index.db`, detect stale branch or parent heads, refresh the snapshot when needed, and provide fast per-file and per-span provenance lookups.
  - file: .gitignore
    span:
      start_line: 1
      end_line: 22
    summary: Ignore the private SQLite state directory for the code index.
    affects: []
    rationale: Prevent the local `.powdrr-lift/` state directory from showing up as a tracked change or leaking into commits.
  - file: src/powdrr_lift/core/index.py
    span:
      start_line: 1
      end_line: 668
    summary: Extend the provenance model and file-patch replay helpers used by the SQLite-backed index.
    affects: []
    rationale: Reuse the existing changelog replay logic for branch snapshots, provenance records, and file-line attribution in the persistent code index.
  - file: src/powdrr_lift/change_log_validation.py
    span:
      start_line: 1
      end_line: 216
    summary: Ignore changelog artifact files when validating the branch diff against the proposed changelog.
    affects: []
    rationale: Prevent the validation workflow from treating the PR changelog file itself as a missing source change.
  - file: tests/test_code_index.py
    span:
      start_line: 1
      end_line: 109
    summary: Add regression coverage for stale-branch refresh and span lookups.
    affects: []
    rationale: Prove the SQLite store is created, refreshes when new commits land on the branch, and still resolves the original change rationale after later line shifts.
  - file: tests/test_changelog_index.py
    span:
      start_line: 1
      end_line: 108
    summary: Cover lineage tracking across later insertions and changelog artifact provenance.
    affects: []
    rationale: Verify the mainline index preserves per-line attribution after later commits and still records the changelog artifact as a provenance-bearing file.
  - file: tests/test_change_log_validation.py
    span:
      start_line: 1
      end_line: 153
    summary: Add regression coverage for ignoring the changelog artifact during validation.
    affects: []
    rationale: Ensure the validator accepts the PR changelog file as repository metadata rather than a missing source change.
relationship_changes: []
