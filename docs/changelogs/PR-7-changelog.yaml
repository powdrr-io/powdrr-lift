version: 1
change_id: 7
title: Add changelog provenance index
intent:
  problem: There was no way to replay changelog documents into a line-level provenance index for the current source tree.
  goal: Build a smart provenance index that maps each current line back to the changelog change that introduced it, while preserving the original PR-time span and intent.
decisions:
  - id: INDEX-001
    summary: Replay merged PR changelog docs in mainline order and transform line provenance through later diffs.
entities: []
changes:
  - file: src/powdrr_lift/__init__.py
    span:
      start_line: 20
      end_line: 62
    summary: Export the changelog provenance index API from the top-level package.
    affects: []
    rationale: Make the new index builder and provenance types available to library callers without importing internal modules.
  - file: src/powdrr_lift/core/__init__.py
    span:
      start_line: 1
      end_line: 50
    summary: Re-export the provenance index builder through the core package.
    affects: []
    rationale: Keep the core package aligned with the rest of the thin-wrapper module layout and surface the new index API consistently.
  - file: src/powdrr_lift/core/index.py
    span:
      start_line: 1
      end_line: 668
    summary: Implement the changelog provenance index and line-history replay logic.
    affects: []
    rationale: Parse merged changelog docs, resolve their PR commits, and replay file diffs so each current line can be traced back to its originating change, intent, and rationale.
  - file: tests/test_changelog_index.py
    span:
      start_line: 1
      end_line: 108
    summary: Add regression coverage for provenance tracking across later insertions.
    affects: []
    rationale: Prove that the index preserves earlier line provenance even when later PRs insert lines that shift file offsets.
relationship_changes: []
