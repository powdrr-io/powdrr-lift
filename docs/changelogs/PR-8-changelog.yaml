schema: https://powdrr.io/schemas/changelog-v1
version: 1
change_id: 8
title: Add changelog provenance index
intent:
  problem: There was no persistent private store for replaying changelog documents
    into a line-level provenance index across branch refreshes.
  goal: Build a smart SQLite-backed provenance index in `.powdrr-lift/state/code_index.db`
    that maps current source lines back to the change that introduced them, refreshes
    when the branch or parent branch changes, and falls back to PR descriptions when
    a commit history entry has no changelog file.
decisions:
- id: INDEX-001
  summary: Replay merged PR changelog docs in mainline order and transform line provenance
    through later diffs.
- id: INDEX-002
  summary: Persist branch snapshots in SQLite keyed by branch and parent branch heads
    for fast file/span lookup and refresh checks.
- id: INDEX-003
  summary: Use PR descriptions as the provenance source when a history entry has no
    changelog artifact.
