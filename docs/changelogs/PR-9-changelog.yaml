title: "Add edit-context skill and index-backed code edit reporting"
intent:
  problem: "Agents needed a reliable way to inspect prior provenance before editing code."
  goal: "Add an installable edit-context skill plus CLI and MCP support that report index-backed context for requested files and line ranges."
