id: system-map-codex-worktree-20260628-1
title: System map synthesized for codex/worktree-20260628-1
requirements:
- id: req-agent-compatibility
  description: Ensure the produced skills work in at least Claude Code, Codex, Aider,
    Cursor, Antigravity, and OpenCode.
  state: added
- id: req-canonical-skill-bundle
  description: Maintain a canonical set of skill bundles that can be rendered into
    the agent-specific layouts required by Claude Code, Codex, Aider, Cursor, Antigravity,
    and OpenCode.
  state: added
- id: req-cross-platform-cli-mcp
  description: Provide adjoining CLI and MCP tooling that runs on macOS, Windows,
    and Linux without platform-specific behavior leaks into the user workflow.
  state: added
- id: req-shared-validation
  description: Validate generated skill packages, installer metadata, and agent-facing
    outputs before publishing them.
  state: added
- id: req-single-command-install
  description: Make the CLI and MCP installable with a single command on each supported
    platform, including a Homebrew-based install path on macOS.
  state: added
- id: req-upgrade-path
  description: Support repeatable updates so teams can refresh skill bundles and the
    accompanying CLI or MCP without hand-editing every agent installation.
  state: added
approach:
- id: app-agent-adapters
  description: Maintain thin adapters for Claude Code, Codex, Aider, Cursor, Antigravity,
    and OpenCode so each agent can consume the same canonical skill content.
  state: added
- id: app-canonical-authoring
  description: Author each skill once in a canonical source format, then render the
    agent-specific skill files and metadata from that source.
  state: added
- id: app-cli-mcp-parity
  description: Expose the same install, render, and validate actions through both
    the CLI and MCP so agents and operators can use whichever surface is available.
  state: added
- id: app-platform-packaging
  description: Package the CLI and MCP as native-installable artifacts for macOS,
    Windows, and Linux, with the macOS path surfaced through Homebrew.
  state: added
- id: app-validation-gates
  description: Gate publishing on validation that checks the rendered skill bundles,
    the cross-platform installer shape, and the agent compatibility matrix.
  state: added
